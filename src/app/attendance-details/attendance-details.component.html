<mat-card class="content-margin">
  <mat-card-title class="margin-medium-left"> Attendance Details </mat-card-title>
  <mat-card-content>
    <div class="margin-medium-top">
      Total Working Days : {{ totalWorkingDays }}
    </div>
    <div class="margin-medium-top">
      Current Working Days :{{ currentWorkingDays }}
    </div>
    <div class="margin-medium-top"> 
      <button mat-stroked-button>show working hours
        <mat-icon matPrefix>arrow drop down</mat-icon>
      </button>
      <button mat-stroked-button class=" margin-medium-left">
        Book Time off
    </button>
    </div>
    <mat-card class="margin-medium-top">
      <table mat-table [dataSource]="dataSource">
        <ng-container
          *ngFor="let column of columnsToDisplay"
          [matColumnDef]="column"
        >
          <th mat-header-cell *matHeaderCellDef>
            {{ column }}
          </th>
          <td mat-cell *matCellDef="let element">
            {{ element[columnsToDataMapping[column]]}}
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
        <tr mat-row *matRowDef="let row; columns: columnsToDisplay"></tr>
      </table>
    </mat-card>
  </mat-card-content>
</mat-card>
