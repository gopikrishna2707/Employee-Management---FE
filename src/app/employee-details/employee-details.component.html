<mat-card class="content-margin-30">
  <mat-card-content>
    <div class="margin-small-top form-container">
      <ng-container *ngIf="isLoading; else formfeild">
        <ngx-skeleton-loader
          animation="progress-dark"
          count="1"
          [theme]="{ height: '40px', width: '15vw' }"
        ></ngx-skeleton-loader>
      </ng-container>
      <!-- Form Field -->
      <ng-template #formfeild>
        <mat-form-field appearance="outline" class="form-field">
          <mat-label>Search employee</mat-label>
          <mat-icon matPrefix>search</mat-icon>
          <input matInput type="text" (input)="onSearch($event)" />
        </mat-form-field>
      </ng-template>
      <ng-container *ngIf="isLoading; else button">
        <ngx-skeleton-loader
          animation="progress-dark"
          count="1"
          [theme]="{ height: '40px', width: '10vw' }"
        ></ngx-skeleton-loader>
      </ng-container>
      <ng-template #button>
        <button
        *ngIf="isAdmin$ |async"
          mat-stroked-button
          [disabled]="isLoading"
          (click)="redirectTo()"
        >
          Add Employee
        </button>
      </ng-template>
    </div>
    <ng-container *ngIf="!isLoading; else loader">
      <div>
        <table
          mat-table
          matSort
          [dataSource]="dataSource"
          [trackBy]="trackById"
          class="mat-elevation-z1"
        >
          <ng-container
            *ngFor="let column of columnsToDisplay; let i = index"
            [matColumnDef]="column"
          >
            <th
              mat-header-cell
              *matHeaderCellDef
              [mat-sort-header]="columnsToDataMapping[column]"
            >
              {{ column }}
            </th>
            <td mat-cell *matCellDef="let element">
              {{ element[columnsToDataMapping[column]] }}
            </td>
          </ng-container>
          <ng-container matColumnDef="editDetails">
            <th mat-header-cell *matHeaderCellDef>Edit details</th>
            <td mat-cell *matCellDef="let element">
              <button mat-button (click)="clickOnEditDetails(element.eid)">
                <mat-icon>edit</mat-icon>
              </button>
            </td>
          </ng-container>
          <ng-container matColumnDef="action">
            <th mat-header-cell *matHeaderCellDef>Action</th>
            <td mat-cell *matCellDef="let element">
              <button mat-icon-button (click)="clickOnDeleteDetails(element)">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="columnsToDisplayWithAction"></tr>
          <tr
            mat-row
            *matRowDef="let row; columns: columnsToDisplayWithAction"
          ></tr>
          <tr
            class="margin-small-top"
            *matNoDataRow
            [attr.colspan]="columnsToDisplayWithAction.length"
          >
            No Data Available
          </tr>
        </table>
        <mat-paginator
          #paginator
          showFirstLastButtons
          pageSize="10"
          [pageSizeOptions]="[10, 50, 100]"
        >
        </mat-paginator>
      </div>
    </ng-container>
    <ng-template #loader>
      <div>
        <ngx-skeleton-loader
          animation="progress-dark"
          count="10"
          appearance="line"
        ></ngx-skeleton-loader>
      </div>
    </ng-template>
  </mat-card-content>
</mat-card>
